<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Estoque</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f1f5f9;
}

/* BOTÃO MENU */

.menu-toggle{
    position:fixed;
    top:15px;
    left:15px;
    z-index:1000;
    border:none;
    background:#2563eb;
    color:white;
    width:45px;
    height:45px;
    border-radius:8px;
    cursor:pointer;
    font-size:20px;
}

/* MENU */

.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    color:white;
    padding:20px;
    position:fixed;
    left:-250px;
    top:0;
    transition:0.4s;
    z-index:999;
}

.sidebar.active{
    left:0;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo h2{
    color:#38bdf8;
}

.menu{
    list-style:none;
}

.menu li{
    margin:15px 0;
}

.menu a{
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    border-radius:8px;
    transition:0.3s;
}

.menu a:hover{
    background:#1e293b;
}

/* CONTEÚDO */

.main{
    width:100%;
    padding:20px;
}

/* TOPO */

.topbar{
    background:white;
    padding:15px 20px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    margin-top:60px;
}

.topbar input{
    width:300px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* CARDS */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:25px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
    color:#64748b;
}

.card p{
    margin-top:10px;
    font-size:28px;
    font-weight:bold;
}

/* FORMULÁRIO */

.form-container{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.form-container h2{
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.form-grid input,
.form-grid select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* BOTÃO */

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

/* TABELA */

.table-container{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

table th{
    background:#e2e8f0;
}

/* STATUS */

.status{
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-size:12px;
}

.entrada{
    background:green;
}

.saida{
    background:red;
}

/* AÇÕES */

.acoes button{
    margin:0;
    padding:8px 12px;
    background:red;
}

.acoes button:hover{
    background:darkred;
}

</style>
</head>
<body>

<!-- BOTÃO MENU -->
<button class="menu-toggle" onclick="toggleMenu()">
    <i class="fa fa-bars"></i>
</button>

<!-- MENU -->
<div class="sidebar" id="sidebar">

    <div class="logo">
        <h2>ALMOX</h2>
    </div>

    <ul class="menu">
        <li><a href="dashboard.html"><i class="fa fa-house"></i> Dashboard</a></li>
        <li><a href="produtos.html"><i class="fa fa-box"></i> Produtos</a></li>
        <li><a href="estoque.html"><i class="fa fa-warehouse"></i> Estoque</a></li>
        <li><a href="fornecedores.html"><i class="fa fa-truck"></i> Fornecedores</a></li>
        <li><a href="relatorios.html"><i class="fa fa-file"></i> Relatórios</a></li>
    </ul>

</div>

<!-- CONTEÚDO -->
<div class="main">

    <!-- TOPO -->
    <div class="topbar">

        <h1>Controle de Estoque</h1>


    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <h3>Total de Movimentações</h3>
            <p id="totalMovimentos">0</p>
        </div>

        <div class="card">
            <h3>Entradas</h3>
            <p id="totalEntradas">0</p>
        </div>

        <div class="card">
            <h3>Saídas</h3>
            <p id="totalSaidas">0</p>
        </div>

    </div>

    <!-- FORMULÁRIO -->
    <div class="form-container">

        <h2>Registrar Movimentação</h2>

        <div class="form-grid">

            <input type="text"
            id="produto"
            placeholder="Produto">

            <input type="number"
            id="quantidade"
            placeholder="Quantidade">

            <select id="tipo">
                <option value="">Tipo</option>
                <option>Entrada</option>
                <option>Saída</option>
            </select>

            <input type="date"
            id="data">

        </div>

        <button onclick="adicionarMovimento()">
            Registrar
        </button>

    </div>

    <!-- TABELA -->
    <div class="table-container">

        <h2>Movimentações</h2>

        <table id="tabelaEstoque">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Tipo</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>

<script>

/* MENU */

function toggleMenu(){

    let sidebar =
    document.getElementById("sidebar");

    sidebar.classList.toggle("active");
}

/* ESTOQUE */

let contador = 1;

function adicionarMovimento(){

    let produto =
    document.getElementById("produto").value;

    let quantidade =
    document.getElementById("quantidade").value;

    let tipo =
    document.getElementById("tipo").value;

    let data =
    document.getElementById("data").value;

    if(produto == "" ||
       quantidade == "" ||
       tipo == "" ||
       data == ""){

        alert("Preencha todos os campos!");
        return;
    }

    let tabela =
    document.querySelector("#tabelaEstoque tbody");

    let linha =
    tabela.insertRow();

    let classe = "";

    if(tipo == "Entrada"){

        classe = "entrada";

    }else{

        classe = "saida";
    }

    linha.innerHTML = `
        <td>${contador}</td>
        <td>${produto}</td>
        <td>${quantidade}</td>

        <td>
            <span class="status ${classe}">
                ${tipo}
            </span>
        </td>

        <td>${data}</td>

        <td class="acoes">

            <button onclick="removerMovimento(this)">
                Excluir
            </button>

        </td>
    `;

    contador++;

    document.getElementById("produto").value = "";
    document.getElementById("quantidade").value = "";
    document.getElementById("tipo").value = "";
    document.getElementById("data").value = "";

    atualizarCards();
}

/* REMOVER */

function removerMovimento(botao){

    let linha =
    botao.parentElement.parentElement;

    linha.remove();

    atualizarCards();
}

/* ATUALIZAR */

function atualizarCards(){

    let linhas =
    document.querySelectorAll("#tabelaEstoque tbody tr");

    let entradas = 0;
    let saidas = 0;

    linhas.forEach(linha => {

        let tipo =
        linha.cells[3].innerText;

        if(tipo.includes("Entrada")){

            entradas++;

        }else{

            saidas++;
        }

    });

    document.getElementById("totalMovimentos").innerText =
    linhas.length;

    document.getElementById("totalEntradas").innerText =
    entradas;

    document.getElementById("totalSaidas").innerText =
    saidas;
}

/* PESQUISA */

function pesquisarMovimento(){

    let input =
    document.getElementById("pesquisa")
    .value
    .toLowerCase();

    let linhas =
    document.querySelectorAll("#tabelaEstoque tbody tr");

    linhas.forEach(linha => {

        let produto =
        linha.cells[1]
        .innerText
        .toLowerCase();

        if(produto.includes(input)){

            linha.style.display = "";

        }else{

            linha.style.display = "none";
        }

    });
}

</script>

</body>
</html>
